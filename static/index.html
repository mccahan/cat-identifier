<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Cat Tracker</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #0f3460;
            --text: #e6e6e6;
            --muted: #888;
            --hawthorne: #333;
            --roxie: #8B4513;
            --sadie: #f0f0f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        header p {
            color: var(--muted);
        }
        
        .last-seen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .cat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .cat-card:hover {
            transform: translateY(-4px);
        }
        
        .cat-card.hawthorne { border-top: 4px solid var(--hawthorne); }
        .cat-card.roxie { border-top: 4px solid var(--roxie); }
        .cat-card.sadie { border-top: 4px solid var(--sadie); }
        
        .cat-card h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-transform: capitalize;
        }
        
        .cat-card .thumbnail {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 15px;
            background: var(--accent);
        }
        
        .cat-card .no-image {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
        }
        
        .cat-card .time-ago {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .cat-card .time-ago.recent { color: #4ade80; }
        .cat-card .time-ago.moderate { color: #facc15; }
        .cat-card .time-ago.old { color: #f87171; }
        
        .cat-card .details {
            color: var(--muted);
            font-size: 0.9rem;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            font-size: 1.5rem;
        }
        
        .btn {
            background: var(--accent);
            color: var(--text);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        
        .btn:hover { opacity: 0.8; }
        
        .recent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .sighting-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .sighting-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .sighting-card .info {
            padding: 12px;
        }
        
        .sighting-card .cat-name {
            font-weight: 600;
            text-transform: capitalize;
            margin-bottom: 4px;
        }
        
        .sighting-card .meta {
            font-size: 0.8rem;
            color: var(--muted);
        }
        
        .sighting-card .confidence {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        
        .sighting-card .confidence.low { color: #f87171; }
        .sighting-card .confidence.corrected { color: #facc15; }
        
        .sighting-card .feedback-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: var(--text);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .sighting-card:hover .feedback-btn { opacity: 1; }
        
        .feedback-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .feedback-modal.active { display: flex; }
        
        .feedback-content {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
        }
        
        .feedback-content h3 { margin-bottom: 20px; }
        
        .feedback-content img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .feedback-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .feedback-buttons button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        
        .feedback-buttons .hawthorne-btn { background: var(--hawthorne); color: #fff; }
        .feedback-buttons .roxie-btn { background: var(--roxie); color: #fff; }
        .feedback-buttons .sadie-btn { background: var(--sadie); color: #333; }
        .feedback-buttons .cancel-btn { background: var(--muted); color: #fff; }
        
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: var(--card);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat .value {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .stat .label {
            color: var(--muted);
            font-size: 0.85rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
        
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .last-seen-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐱 Cat Tracker</h1>
            <p>Keeping an eye on your furry friends</p>
        </header>
        
        <div class="stats" id="stats">
            <div class="stat">
                <div class="value" id="stat-today">-</div>
                <div class="label">Sightings Today</div>
            </div>
            <div class="stat">
                <div class="value" id="stat-total">-</div>
                <div class="label">Total Sightings</div>
            </div>
            <div class="stat">
                <div class="value" id="stat-corrections">-</div>
                <div class="label">Corrections</div>
            </div>
        </div>
        
        <div class="last-seen-grid" id="last-seen">
            <div class="loading">Loading...</div>
        </div>
        
        <div class="section-header">
            <h2>Recent Sightings</h2>
            <button class="btn" onclick="refreshData()">🔄 Refresh</button>
        </div>
        
        <div class="recent-grid" id="recent">
            <div class="loading">Loading...</div>
        </div>
    </div>
    
    <div class="feedback-modal" id="feedback-modal">
        <div class="feedback-content">
            <h3>Who is this really?</h3>
            <img id="feedback-img" src="" alt="Cat">
            <p id="feedback-current">Currently labeled: <strong></strong></p>
            <div class="feedback-buttons">
                <button class="hawthorne-btn" onclick="submitFeedback('hawthorne')">⬛ Hawthorne</button>
                <button class="roxie-btn" onclick="submitFeedback('roxie')">🟫 Roxie</button>
                <button class="sadie-btn" onclick="submitFeedback('sadie')">⬜ Sadie</button>
                <button class="cancel-btn" onclick="closeFeedback()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentFeedbackSighting = null;
        
        function timeAgo(timestamp) {
            const seconds = Math.floor(Date.now() / 1000 - timestamp);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)}d ago`;
            return new Date(timestamp * 1000).toLocaleDateString();
        }
        
        function getTimeClass(timestamp) {
            const hours = (Date.now() / 1000 - timestamp) / 3600;
            if (hours < 2) return 'recent';
            if (hours < 12) return 'moderate';
            return 'old';
        }
        
        function formatTime(timestamp) {
            return new Date(timestamp * 1000).toLocaleString();
        }
        
        async function loadLastSeen() {
            try {
                const resp = await fetch('/api/cats');
                const data = await resp.json();
                
                const container = document.getElementById('last-seen');
                container.innerHTML = '';
                
                for (const [cat, info] of Object.entries(data)) {
                    const card = document.createElement('div');
                    card.className = `cat-card ${cat}`;
                    
                    if (info) {
                        const timeClass = getTimeClass(info.last_seen);
                        card.innerHTML = `
                            <h2>${cat}</h2>
                            <img class="thumbnail" src="/api/sighting/${info.sighting_id}/thumbnail" alt="${cat}">
                            <div class="time-ago ${timeClass}">${timeAgo(info.last_seen)}</div>
                            <div class="details">
                                ${info.camera} • ${info.confidence > 0 ? (info.confidence * 100).toFixed(0) + '%' : 'Corrected'}
                            </div>
                        `;
                    } else {
                        card.innerHTML = `
                            <h2>${cat}</h2>
                            <div class="no-image">❓</div>
                            <div class="time-ago">Not seen yet</div>
                            <div class="details">No sightings recorded</div>
                        `;
                    }
                    
                    container.appendChild(card);
                }
            } catch (e) {
                console.error('Error loading last seen:', e);
            }
        }
        
        async function loadRecent() {
            try {
                const resp = await fetch('/api/recent?limit=12');
                const data = await resp.json();
                
                const container = document.getElementById('recent');
                container.innerHTML = '';
                
                for (const sighting of data) {
                    const card = document.createElement('div');
                    card.className = 'sighting-card';
                    
                    const confClass = sighting.confidence < 0 ? 'corrected' : 
                                     sighting.confidence < 0.7 ? 'low' : '';
                    const confText = sighting.confidence < 0 ? 'Corrected' : 
                                    `${(sighting.confidence * 100).toFixed(0)}%`;
                    
                    card.innerHTML = `
                        <img src="/api/sighting/${sighting.id}/thumbnail" alt="${sighting.cat_name}">
                        <span class="confidence ${confClass}">${confText}</span>
                        <button class="feedback-btn" onclick="openFeedback(${sighting.id}, '${sighting.cat_name}')">✏️ Fix</button>
                        <div class="info">
                            <div class="cat-name">${sighting.cat_name}</div>
                            <div class="meta">${sighting.camera} • ${timeAgo(sighting.timestamp)}</div>
                        </div>
                    `;
                    
                    container.appendChild(card);
                }
            } catch (e) {
                console.error('Error loading recent:', e);
            }
        }
        
        async function loadStats() {
            try {
                const resp = await fetch('/api/stats');
                const data = await resp.json();
                
                const todayTotal = Object.values(data.today || {}).reduce((a, b) => a + b, 0);
                const allTotal = Object.values(data.totals || {}).reduce((a, b) => a + b, 0);
                
                document.getElementById('stat-today').textContent = todayTotal;
                document.getElementById('stat-total').textContent = allTotal;
                document.getElementById('stat-corrections').textContent = data.corrections || 0;
            } catch (e) {
                console.error('Error loading stats:', e);
            }
        }
        
        function openFeedback(sightingId, currentLabel) {
            currentFeedbackSighting = sightingId;
            document.getElementById('feedback-img').src = `/api/sighting/${sightingId}/thumbnail`;
            document.getElementById('feedback-current').innerHTML = `Currently labeled: <strong>${currentLabel}</strong>`;
            document.getElementById('feedback-modal').classList.add('active');
        }
        
        function closeFeedback() {
            currentFeedbackSighting = null;
            document.getElementById('feedback-modal').classList.remove('active');
        }
        
        async function submitFeedback(correctLabel) {
            if (!currentFeedbackSighting) return;
            
            try {
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sighting_id: currentFeedbackSighting,
                        correct_label: correctLabel
                    })
                });
                
                closeFeedback();
                refreshData();
            } catch (e) {
                console.error('Error submitting feedback:', e);
                alert('Failed to submit feedback');
            }
        }
        
        function refreshData() {
            loadLastSeen();
            loadRecent();
            loadStats();
        }
        
        // Initial load
        refreshData();
        
        // Auto-refresh every 2 minutes
        setInterval(refreshData, 120000);
        
        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeFeedback();
        });
        
        // Close modal on background click
        document.getElementById('feedback-modal').addEventListener('click', (e) => {
            if (e.target.id === 'feedback-modal') closeFeedback();
        });
    </script>
</body>
</html>
